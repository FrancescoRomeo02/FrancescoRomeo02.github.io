<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenzione in corso</title>
    <script>
        setTimeout(function () {
            window.location.href = "HTML/index.html";
        }, 15000); // 15000 millisecondi = 15 secondi
    </script>
</head>

<body>
    <div style="text-align: center; margin-top: 100px;">
        <h1>Il sito web è in manutenzione</h1>
        <p>Sarete reindirizzati alla pagina provvisoria tra 15 secondi. Se non volete aspettare, fare clic sul link sottostante.</p>
        <a href="HTML/index.html">Reindirizzamento immediato</a>
    </div>
</body>

</html>
