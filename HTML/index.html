<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #F5F5F5;
  }

  .box {
    width: 100px;
    height: 100px;
    margin: 10px;
    display: inline-block;
  }

  .white-box { background-color: #FFFFFF; }
  .light-gray-box { background-color: #F5F5F5; }
  .dark-gray-box { background-color: #333333; }
  .blue-box { background-color: #007BFF; }
  .green-box { background-color: #00B894; }
</style>
<title>Color Boxes</title>
</head>
<body>
  <div class="box white-box"></div>
  <div class="box light-gray-box"></div>
  <div class="box dark-gray-box"></div>
  <div class="box blue-box"></div>
  <div class="box green-box"></div>
</body>
</html>
